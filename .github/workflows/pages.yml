name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate index.html || echo "✅ HTML check done"
        continue-on-error: true

      - name: Inject Gemini API Key
        run: |
          echo "window.__GEMINI_API_KEY__ = '${{ secrets.GEMINI_API_KEY }}';" > js/env.js
          echo "✅ env.js criado com sucesso"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Comment on Success
        if: success()
        run: echo "✅ Deploy bem-sucedido! 🚀"