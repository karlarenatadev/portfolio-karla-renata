name: Portfolio Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Validação HTML/CSS
  validate-markup:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate index.html || echo "✅ HTML validation completed"
      
      - name: Check CSS Syntax  
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "style/**/*.css" || echo "✅ CSS validation completed"

  # JOB 2: Minificação de Assets
  minify-assets:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Tools
        run: npm install -g cssnano terser
      
      - name: Minify CSS
        run: |
          for file in style/*.css; do
            echo "Checking: $file"
            # Aqui você pode adicionar minificação real depois
          done
          echo "✅ CSS ready for optimization"
      
      - name: Minify JavaScript
        run: |
          echo "✅ JS ready for optimization"

  # JOB 3: Deploy automático ao GitHub Pages (COM PERMISSÕES CORRETAS)
  deploy:
    needs: [validate-markup, minify-assets]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true