name: Portfolio Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Validação HTML/CSS
  validate-markup:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate index.html || echo "HTML validation completed with warnings"
      
      - name: Check CSS Syntax  
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "style/**/*.css" || echo "CSS check completed with warnings"

  # JOB 2: Performance (sem Lighthouse CI - complexo demais por agora)
  build-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Minify Assets
        run: |
          npm install -g cssnano terser
          echo "✅ Asset minification tools ready"

  # JOB 3: Deploy automático ao GitHub Pages
  deploy:
    needs: [validate-markup, build-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./