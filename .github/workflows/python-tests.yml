# ⚠️ DESABILITADO - Ativar quando houver projetos Python no repositório

name: Python Quality Tests

on:
  # Desabilitado temporariamente - sem arquivos .py no repositório principal
  workflow_dispatch:  # Só roda manualmente, não automático

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov flake8 black
      
      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --exclude=venv || true
      
      - name: Format check with black
        run: black --check . || true
      
      - name: Run tests
        run: pytest --cov=. --cov-report=xml || true